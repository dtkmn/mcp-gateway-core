tasks.register('verifyGatewaySpringWebFluxPublicPreviewPublication') {
    group = 'verification'
    description = 'Runs public-preview checks for the Spring WebFlux adapter artifact.'
    dependsOn tasks.named('build')
    dependsOn tasks.named('verifyNoForbiddenSpringWebFluxAdapterCoupling')
