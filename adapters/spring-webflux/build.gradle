def springWebFluxShortTempDirectory = {
    File tmp = new File('/tmp')
    if (!tmp.isDirectory() || !tmp.canWrite()) {
        tmp = new File(System.getProperty('java.io.tmpdir'))
    }
    tmp
}
def springWebFluxSignedDryRunGpgHome = {
    String projectHash = Integer.toUnsignedString(rootProject.projectDir.absolutePath.hashCode(), 16)
    new File(springWebFluxShortTempDirectory(), "mgw-gpg-${projectHash}")
}
def springWebFluxPublishedFileIn = { File publicationDir, String suffix ->
    new File(publicationDir, "${springWebFluxArtifactId}-${springWebFluxPublicationVersion}${suffix}")
}
def springWebFluxRequiredArtifacts = { File publicationDir ->
    [
            springWebFluxPublishedFileIn(publicationDir, '.pom'),
            springWebFluxPublishedFileIn(publicationDir, '.jar'),
            springWebFluxPublishedFileIn(publicationDir, '-sources.jar'),
            springWebFluxPublishedFileIn(publicationDir, '-javadoc.jar')
    ]
}

