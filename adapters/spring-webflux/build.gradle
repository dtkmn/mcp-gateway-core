    archiveFileName = springWebFluxCentralBundleName
    destinationDirectory = layout.buildDirectory.dir('central-portal-bundle')
}

tasks.register('verifyGatewaySpringWebFluxCentralPortalBundle') {
    group = 'verification'
    description = 'Verifies the unsigned Central Portal bundle shape and checksums for the Spring WebFlux adapter.'
    dependsOn tasks.named('stageGatewaySpringWebFluxCentralPortalBundle')

    doLast {
        File bundle = tasks.named('stageGatewaySpringWebFluxCentralPortalBundle').get().archiveFile.get().asFile
        verifyCentralPortalBundleShape(springWebFluxPublicationDirectory(), bundle, false)
        verifyCentralPortalBundlePayload(bundle, false)
        println 'Spring WebFlux Central Portal bundle shape verified without .asc signatures.'
    }
}

tasks.register('prepareGatewaySpringWebFluxSignedCentralPortalDryRunPublication') {
    group = 'publishing'
    description = 'Creates a signed dry-run publication directory for the Spring WebFlux adapter using an ephemeral local GPG key.'
    dependsOn tasks.named('publishGatewaySpringWebFluxPublicationToGatewayCoreStagingRepository')

    doLast {
        File publicationRoot = springWebFluxSignedDryRunPublicationRoot()
        delete publicationRoot
        copy {
            from(springWebFluxPublicationDirectory()) {
                into publicationPath
            }
            into publicationRoot
        }
        File gpgHome = springWebFluxSignedDryRunGpgHome()
        delete gpgHome
        generateDryRunSigningKey(gpgHome)
        springWebFluxRequiredArtifacts(springWebFluxSignedDryRunPublicationDirectory()).each { artifact ->
            signDryRunArtifact(gpgHome, artifact)
        }
    }
}

