tasks.register('verifyGatewaySpringWebFluxPublication') {
    group = 'verification'
    description = 'Verifies the local Maven publication shape for the Spring WebFlux adapter.'
    dependsOn tasks.named('publishGatewaySpringWebFluxPublicationToGatewayCoreStagingRepository')

    doLast {
        File publicationDir = springWebFluxPublicationDirectory()
        File jarFile = new File(publicationDir, "${springWebFluxArtifactId}-${springWebFluxPublicationVersion}.jar")
        File pomFile = new File(publicationDir, "${springWebFluxArtifactId}-${springWebFluxPublicationVersion}.pom")
        if (!jarFile.isFile()) {
            throw new GradleException("Missing adapter publication JAR: ${jarFile}")
        }
        if (!pomFile.isFile()) {
            throw new GradleException("Missing adapter publication POM: ${pomFile}")
        }
        String pomText = pomFile.text
        if (!pomText.contains('<artifactId>mcp-gateway-core</artifactId>')) {
            throw new GradleException('Adapter POM must declare a dependency on mcp-gateway-core.')
        }
        if (pomText.contains(forbiddenDownstreamMarker)
                || pomText.contains('org.zaproxy')
                || pomText.contains(privateRepoMarker)) {
            throw new GradleException('Adapter POM contains forbidden downstream or private metadata.')
        }
    }
}

tasks.register('stageGatewaySpringWebFluxCentralPortalBundle', Zip) {
    group = 'publishing'
    description = 'Stages a Central Portal upload bundle for mcp-gateway-spring-webflux without signatures.'
    dependsOn tasks.named('publishGatewaySpringWebFluxPublicationToGatewayCoreStagingRepository')
