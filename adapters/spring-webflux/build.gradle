}

tasks.register('verifyGatewaySpringWebFluxSignedCentralPortalDryRun') {
    group = 'verification'
    description = 'Verifies signatures, checksums, and ZIP payload for the Spring WebFlux adapter signed Central Portal dry run.'
    dependsOn tasks.named('stageGatewaySpringWebFluxSignedCentralPortalDryRunBundle')

    doLast {
        File bundle = springWebFluxSignedDryRunBundle()
        File gpgHome = springWebFluxSignedDryRunGpgHome()
        verifyCentralPortalBundleShape(springWebFluxSignedDryRunPublicationDirectory(), bundle, true, gpgHome)
