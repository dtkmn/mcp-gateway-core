name: Central Validation Upload

on:
  workflow_dispatch:
    inputs:
      execute_upload:
        description: "Submit the bundle to Central as USER_MANAGED validation only"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      upload_confirmation:
        description: "Exact confirmation token printed by dry-run mode"
        required: false
        default: ""
        type: string

concurrency:
  group: central-validation-upload
  cancel-in-progress: false

jobs:
  validation-upload:
    runs-on: ubuntu-latest
    environment: central-validation-upload
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Set up JDK 17 for release consumer checks
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Capture JDK 17 home
        run: echo "GATEWAY_CORE_JAVA17_HOME=${JAVA_HOME}" >> "${GITHUB_ENV}"

      - name: Set up JDK 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: gradle

      - name: Import release GPG key
        env:
          GATEWAY_CORE_RELEASE_GPG_PRIVATE_KEY_B64: ${{ secrets.GATEWAY_CORE_RELEASE_GPG_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${GATEWAY_CORE_RELEASE_GPG_PRIVATE_KEY_B64}" ]; then
            echo "GATEWAY_CORE_RELEASE_GPG_PRIVATE_KEY_B64 is required." >&2
            exit 1
          fi
          release_gpg_home="${RUNNER_TEMP}/gateway-core-release-gpg"
          mkdir -p "$release_gpg_home"
          chmod 700 "$release_gpg_home"
          echo "GATEWAY_CORE_RELEASE_GPG_HOME=$release_gpg_home" >> "$GITHUB_ENV"
          key_file="${RUNNER_TEMP}/gateway-core-release-key.asc"
          printf '%s' "$GATEWAY_CORE_RELEASE_GPG_PRIVATE_KEY_B64" | base64 --decode > "$key_file"
          gpg --batch --homedir "$release_gpg_home" --import "$key_file"
          rm -f "$key_file"

      - name: Run guarded Central validation upload path
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          CENTRAL_UPLOAD_CONFIRMATION: ${{ inputs.upload_confirmation }}
          CENTRAL_PUBLISHING_TYPE: USER_MANAGED
          GATEWAY_CORE_RELEASE_GPG_FINGERPRINT: ${{ secrets.GATEWAY_CORE_RELEASE_GPG_FINGERPRINT }}
          GATEWAY_CORE_RELEASE_GPG_PASSPHRASE: ${{ secrets.GATEWAY_CORE_RELEASE_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          args=()
          if [ "${{ inputs.execute_upload }}" = "true" ]; then
            args+=(--execute-upload)
          fi
          ./bin/gateway-public-preview-central-validation-upload.sh "${args[@]}"

      - name: Upload validation upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gateway-public-preview-central-validation-upload
          if-no-files-found: ignore
          retention-days: 7
          path: |
            build/gateway-public-preview-central-validation-upload/mcp-gateway-public-preview-*-central-validation-bundle.zip
            build/gateway-public-preview-central-validation-upload/deployment-id.txt
            build/gateway-public-preview-central-validation-upload/deployment-status.json
            build/gateway-public-preview-central-validation-upload/deployment-status-error.txt
            build/gateway-public-preview-central-validation-upload/deployment-upload-response.txt
