name: Snyk

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: "37 18 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  gradle-open-source:
    name: Gradle Open Source scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Require Snyk configuration
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG: ${{ secrets.SNYK_ORG || vars.SNYK_ORG }}
        run: |
          set -euo pipefail
          if [ -z "${SNYK_TOKEN}" ]; then
            echo "::error::Missing SNYK_TOKEN repository or organization secret. Configure Snyk before treating this workflow as a passing external scan."
            exit 1
          fi
          if [ -z "${SNYK_ORG}" ]; then
            echo "::notice::SNYK_ORG secret or variable is not set; Snyk will use the default organization associated with SNYK_TOKEN."
          fi

      - name: Install Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0

      - name: Run Snyk Open Source scan
        id: snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG: ${{ secrets.SNYK_ORG || vars.SNYK_ORG }}
        run: |
          set +e
          snyk_args=(--all-sub-projects --policy-path=.snyk --sarif-file-output=snyk-open-source.sarif)
          if [ -n "${SNYK_ORG}" ]; then
            snyk_args+=("--org=${SNYK_ORG}")
          fi
          snyk test "${snyk_args[@]}"
          status=$?
          echo "exit_code=${status}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload Snyk SARIF to GitHub Code Scanning
        if: always() && hashFiles('snyk-open-source.sarif') != ''
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: snyk-open-source.sarif
          category: snyk-open-source

      - name: Upload Snyk SARIF artifact
        if: always() && hashFiles('snyk-open-source.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: snyk-open-source-sarif
          if-no-files-found: error
          retention-days: 14
          path: snyk-open-source.sarif

      - name: Enforce Snyk result
        if: always() && steps.snyk.outputs.exit_code != ''
        run: |
          set -euo pipefail
          exit "${{ steps.snyk.outputs.exit_code }}"
