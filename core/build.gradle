    new File(gatewayCoreShortTempDirectory(), "mgc-gpg-${projectHash}")
}

def gatewayCorePublishedFileIn = { File publicationDir, String suffix ->
    new File(publicationDir, "${gatewayCoreArtifactId}-${gatewayCorePublicationVersion}${suffix}")
}

def gatewayCoreRequiredArtifacts = { File publicationDir ->
    [
            gatewayCorePublishedFileIn(publicationDir, '.pom'),
            gatewayCorePublishedFileIn(publicationDir, '.jar'),
            gatewayCorePublishedFileIn(publicationDir, '-sources.jar'),
            gatewayCorePublishedFileIn(publicationDir, '-javadoc.jar')
    ]
}

def verifyChecksumFile = { File artifact, String algorithm, String extension ->
    File checksum = new File(artifact.parentFile, "${artifact.name}.${extension}")
    if (!checksum.isFile()) {
        throw new GradleException("Missing ${extension} checksum for Central bundle artifact: ${artifact.name}")
    }
    java.security.MessageDigest digest = java.security.MessageDigest.getInstance(algorithm)
    digest.update(artifact.bytes)
    String expected = digest.digest().collect { String.format('%02x', it & 0xff) }.join()
    String actual = checksum.text.trim().split(/\s+/)[0]
    if (!expected.equalsIgnoreCase(actual)) {
        throw new GradleException("Invalid ${extension} checksum for Central bundle artifact: ${artifact.name}")
    }
}

def verifyPomMetadata = { File pom ->
    def parsed = new groovy.xml.XmlSlurper(false, false).parse(pom)
    Map<String, String> requiredText = [
            groupId    : gatewayCoreGroupId,
            artifactId : gatewayCoreArtifactId,
            version    : gatewayCorePublicationVersion,
            name       : 'MCP Gateway Core',
            description: 'Java governance contracts for MCP tool gateways; a library layer, not a proxy data plane.',
            url        : 'https://github.com/dtkmn/mcp-gateway-core'
    ]
    requiredText.each { field, expected ->
        String actual = parsed."${field}".text()
        if (actual != expected) {
            throw new GradleException("Central POM ${pom.name} has invalid ${field}: expected '${expected}', got '${actual}'")
        }
    }
    boolean hasApacheLicense = parsed.licenses.license.any {
        it.name.text() == 'Apache License, Version 2.0' && it.url.text() == 'https://www.apache.org/licenses/LICENSE-2.0'
    }
    if (!hasApacheLicense) {
        throw new GradleException("Central POM ${pom.name} must declare the Apache 2.0 license.")
    }
    boolean hasDeveloper = parsed.developers.developer.any {
        it.id.text() == 'dtkmn' && it.name.text() == 'Daniel Tse'
    }
    if (!hasDeveloper) {
        throw new GradleException("Central POM ${pom.name} must declare the dtkmn developer metadata.")
    }
    if (parsed.scm.connection.text() != 'scm:git:https://github.com/dtkmn/mcp-gateway-core.git'
            || parsed.scm.developerConnection.text() != 'scm:git:ssh://git@github.com/dtkmn/mcp-gateway-core.git'
            || parsed.scm.url.text() != 'https://github.com/dtkmn/mcp-gateway-core') {
        throw new GradleException("Central POM ${pom.name} must declare mcp-gateway-core SCM metadata.")
    }
}

def verifyDetachedSignature = { File artifact, File gpgHome = null ->
    File signature = new File(artifact.parentFile, "${artifact.name}.asc")
    if (!signature.isFile()) {
        throw new GradleException("Central Portal release mode requires a detached signature: ${signature.name}")
    }

    List<String> command = ['gpg', '--batch']
    if (gpgHome != null) {
        command.addAll(['--homedir', gpgHome.absolutePath])
    }
    command.addAll(['--verify', signature.absolutePath, artifact.absolutePath])
    ProcessBuilder processBuilder = new ProcessBuilder(command.collect { it.toString() })
    processBuilder.redirectErrorStream(true)
    Process process
    try {
        process = processBuilder.start()
    } catch (IOException e) {
        throw new GradleException('Central Portal release mode requires gpg on PATH to verify detached signatures.', e)
    }
    String output = process.inputStream.text
    int exitCode = process.waitFor()
    if (exitCode != 0) {
        throw new GradleException("Invalid detached signature for Central bundle artifact ${artifact.name}: ${output.trim()}")
    }
}

def runGpgCommand = { File gpgHome, List<String> args, String failureMessage ->
    List<String> command = ['gpg', '--batch', '--homedir', gpgHome.absolutePath] + args
    Process process
    try {
        process = new ProcessBuilder(command.collect { it.toString() }).redirectErrorStream(true).start()
    } catch (IOException e) {
        throw new GradleException("${failureMessage}: gpg is not available on PATH.", e)
    }
    String output = process.inputStream.text
    int exitCode = process.waitFor()
    if (exitCode != 0) {
        throw new GradleException("${failureMessage}: ${output.trim()}")
    }
}

def secureGpgHome = { File gpgHome ->
    gpgHome.mkdirs()
    try {
        java.nio.file.Files.setPosixFilePermissions(
                gpgHome.toPath(),
                java.util.EnumSet.of(java.nio.file.attribute.PosixFilePermission.OWNER_READ,
                        java.nio.file.attribute.PosixFilePermission.OWNER_WRITE,
                        java.nio.file.attribute.PosixFilePermission.OWNER_EXECUTE)
        )
    } catch (UnsupportedOperationException ignored) {
        // Non-POSIX filesystems are allowed in local development; gpg rejects truly unsafe homes.
    }
}

def generateDryRunSigningKey = { File gpgHome ->
    secureGpgHome(gpgHome)
    File keyBatch = new File(gpgHome.parentFile, 'mcp-gateway-core-dry-run-signing-key.batch')
    keyBatch.text = '''Key-Type: RSA
Key-Length: 3072
Name-Real: MCP Gateway Core Dry Run
Name-Email: dry-run@example.invalid
Expire-Date: 0
%no-protection
%commit
'''
    runGpgCommand(gpgHome, ['--generate-key', keyBatch.absolutePath], 'Failed to generate dry-run signing key')
}

def signDryRunArtifact = { File gpgHome, File artifact ->
    runGpgCommand(
            gpgHome,
            ['--armor', '--detach-sign', '--output', "${artifact.absolutePath}.asc", artifact.absolutePath],
            "Failed to sign dry-run artifact ${artifact.name}"
    )
}

def verifyCentralPortalBundleShape = { File publicationDir, File bundle, boolean requireSignatures, File verificationGpgHome = null ->
    if (gatewayCorePublicationVersion.endsWith('-SNAPSHOT')) {
        throw new GradleException('Central Portal bundle proof requires a release version, not a SNAPSHOT version.')
    }

    List<File> requiredArtifacts = gatewayCoreRequiredArtifacts(publicationDir)
    List<String> checksumExtensions = ['md5', 'sha1', 'sha256', 'sha512']

    requiredArtifacts.each { artifact ->
        if (!artifact.isFile()) {
            throw new GradleException("Central Portal bundle is missing required artifact: ${artifact.name}")
        }
        if (artifact.name.endsWith('.pom')) {
            verifyPomMetadata(artifact)
        }
        verifyChecksumFile(artifact, 'MD5', 'md5')
        verifyChecksumFile(artifact, 'SHA-1', 'sha1')
        verifyChecksumFile(artifact, 'SHA-256', 'sha256')
        verifyChecksumFile(artifact, 'SHA-512', 'sha512')
        if (requireSignatures) {
            verifyDetachedSignature(artifact, verificationGpgHome)
        }
    }

    if (!bundle.isFile()) {
        throw new GradleException("Central Portal bundle ZIP was not created: ${bundle}")
    }
    new java.util.zip.ZipFile(bundle).withCloseable { zip ->
        Set<String> allowedEntries = [] as Set
        requiredArtifacts.each { artifact ->
            String relativeEntry = "${gatewayCorePublicationPath}/${artifact.name}"
            allowedEntries.add(relativeEntry)
            checksumExtensions.each { checksumExtension ->
                allowedEntries.add("${relativeEntry}.${checksumExtension}".toString())
            }
            if (requireSignatures) {
                allowedEntries.add("${relativeEntry}.asc".toString())
            }
        }

        List<String> entries = zip.entries().collect { it.name }
        List<String> unexpectedEntries = zip.entries()
                .findAll { !it.isDirectory() && !allowedEntries.contains(it.name) }
                .collect { it.name }
                .sort()
        if (!unexpectedEntries.isEmpty()) {
            throw new GradleException("Central Portal bundle ZIP contains unexpected entries: ${unexpectedEntries}")
        }

        requiredArtifacts.each { artifact ->
            String relativeEntry = "${gatewayCorePublicationPath}/${artifact.name}"
            if (!entries.contains(relativeEntry)) {
                throw new GradleException("Central Portal bundle ZIP is missing ${relativeEntry}")
            }
            checksumExtensions.each { checksumExtension ->
                String checksumEntry = "${relativeEntry}.${checksumExtension}"
                if (!entries.contains(checksumEntry)) {
                    throw new GradleException("Central Portal bundle ZIP is missing ${checksumEntry}")
                }
            }
            if (requireSignatures && !entries.contains("${relativeEntry}.asc".toString())) {
                throw new GradleException("Central Portal bundle ZIP is missing ${relativeEntry}.asc")
            }
        }
    }
}

def verifyCentralPortalBundlePayload = { File bundle, boolean requireSignatures, File verificationGpgHome = null ->
    File extractionRoot = gatewayCoreBundleExtractionDirectory()
    delete extractionRoot
    copy {
        from zipTree(bundle)
        into extractionRoot
    }
    File extractedPublicationDir = new File(extractionRoot, gatewayCorePublicationPath)
    verifyCentralPortalBundleShape(extractedPublicationDir, bundle, requireSignatures, verificationGpgHome)
}

