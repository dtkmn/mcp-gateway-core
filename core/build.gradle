def downstreamPackageMarker = 'mcp.server.' + 'zap'
def scannerClientMarker = 'org.' + 'zaproxy'
def publicToolPrefixMarker = 'zap' + '_'
def privateRepoMarker = 'agentic-security-' + 'gateway'
def privateBrandMarker = 'Agent' + 'ic'
def privateAcronymMarker = 'A' + 'SG'
def forbiddenSourceCouplingPattern = ~/(\Q${downstreamPackageMarker}\E|\Q${scannerClientMarker}\E|\Q${publicToolPrefixMarker}\E|org\.springframework|ScanJob|ScanHistory|ReportService|FindingsService|enterprise|\Q${privateRepoMarker}\E|\Q${privateBrandMarker}\E|\b\Q${privateAcronymMarker}\E\b|A2A|LLM provider|Kubernetes Gateway|service mesh)/
def forbiddenMetadataLeakPattern = ~/(\Q${downstreamPackageMarker}\E|\Q${scannerClientMarker}\E|\Q${publicToolPrefixMarker}\E|\Q${privateRepoMarker}\E|\Q${privateBrandMarker}\E|\b\Q${privateAcronymMarker}\E\b)/

tasks.register('verifyNoForbiddenCoupling') {
    group = 'verification'
    description = 'Rejects ZAP, app-runtime, private, and data-plane gateway coupling from gateway-core.'

    inputs.files(fileTree('src') {
        include '**/*.java'
    }, rootProject.files('README.md', 'settings.gradle', 'gradle.properties'))

    doLast {
        List<String> matches = []
        fileTree('src') {
            include '**/*.java'
        }.files.sort().each { file ->
            file.readLines().eachWithIndex { line, index ->
                if (line =~ forbiddenSourceCouplingPattern) {
                    matches.add("${project.relativePath(file)}:${index + 1}: ${line.trim()}")
                }
            }
        }
        rootProject.files('README.md', 'settings.gradle', 'gradle.properties').files.findAll { it.isFile() }.sort().each { file ->
            file.readLines().eachWithIndex { line, index ->
                if (line =~ forbiddenMetadataLeakPattern) {
                    matches.add("${rootProject.relativePath(file)}:${index + 1}: ${line.trim()}")
                }
            }
        }
        if (!matches.isEmpty()) {
            throw new GradleException("gateway-core contains forbidden coupling:\n${matches.join('\n')}")
        }
    }
}

tasks.register('verifyGatewayCoreJarClosedWorld') {
    group = 'verification'
    description = 'Verifies the gateway-core JAR contains only mcp/gateway/core classes and manifest metadata.'
    dependsOn tasks.named('jar')

    doLast {
        File jarFile = tasks.named('jar').get().archiveFile.get().asFile
        List<String> classes = []
        List<String> unexpected = []
        new java.util.zip.ZipFile(jarFile).withCloseable { jar ->
            jar.entries().each { entry ->
                String name = entry.name
                boolean manifestEntry = name == 'META-INF/' || name == 'META-INF/MANIFEST.MF'
                boolean allowedEntry = name.startsWith('mcp/gateway/core/')
                boolean allowedParentDirectory = entry.isDirectory() && 'mcp/gateway/core/'.startsWith(name)
                if (allowedEntry && name.endsWith('.class')) {
                    classes.add(name)
                }
                if (!manifestEntry && !allowedEntry && !allowedParentDirectory) {
                    unexpected.add(name)
                }
            }
        }
        if (classes.isEmpty()) {
            throw new GradleException('gateway-core JAR must contain classes under mcp/gateway/core/.')
        }
        if (!unexpected.isEmpty()) {
            throw new GradleException("gateway-core JAR contains unexpected entries: ${unexpected.sort().take(20)}")
        }
    }
}

tasks.register('verifyGatewayCoreJdeps') {
    group = 'verification'
    description = 'Verifies the gateway-core JAR depends only on java.base.'
    dependsOn tasks.named('jar')

    doLast {
        File jarFile = tasks.named('jar').get().archiveFile.get().asFile
        Process process = new ProcessBuilder('jdeps', '-summary', jarFile.absolutePath)
                .redirectErrorStream(true)
                .start()
        String output = process.inputStream.getText('UTF-8')
        int exitCode = process.waitFor()
        if (exitCode != 0) {
            throw new GradleException("jdeps failed with exit code ${exitCode}: ${output}")
        }
        List<String> lines = output
                .readLines()
                .collect { it.trim() }
                .findAll { !it.isEmpty() }
        if (lines != ["${jarFile.name} -> java.base"]) {
            throw new GradleException("gateway-core JAR must depend only on java.base; got ${lines}")
        }
    }
}

tasks.register('verifyGatewayCoreJavaReleaseBytecode') {
    group = 'verification'
    description = 'Verifies gateway-core emits Java 17-compatible class files.'
    dependsOn tasks.named('jar')

    doLast {
        File jarFile = tasks.named('jar').get().archiveFile.get().asFile
        List<String> mismatches = []
        int classCount = 0
        new java.util.zip.ZipFile(jarFile).withCloseable { jar ->
            jar.entries().each { entry ->
                if (!entry.name.endsWith('.class')) {
                    return
                }
                classCount++
                jar.getInputStream(entry).withCloseable { input ->
                    byte[] header = input.readNBytes(8)
                    if (header.length < 8) {
                        mismatches.add("${entry.name}: truncated class header")
                        return
                    }
                    int major = ((header[6] & 0xff) << 8) | (header[7] & 0xff)
                    if (major != gatewayJavaClassFileMajorVersion) {
                        mismatches.add("${entry.name}: class-file major ${major}, expected ${gatewayJavaClassFileMajorVersion} for Java ${gatewayJavaRelease}")
                    }
                }
            }
        }
        if (classCount == 0) {
            throw new GradleException('gateway-core JAR must contain class files to verify.')
        }
        if (!mismatches.isEmpty()) {
            throw new GradleException("gateway-core JAR is not Java ${gatewayJavaRelease} bytecode:\n${mismatches.take(20).join('\n')}")
        }
    }
}

