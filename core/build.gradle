def gatewayCorePublicationArtifact = { File publicationDir, String extension, String classifier = null ->
    String resolvedVersion = gatewayCorePublicationVersion
    if (gatewayCorePublicationVersion.endsWith('-SNAPSHOT')) {
        File metadataFile = new File(publicationDir, 'maven-metadata.xml')
        if (!metadataFile.isFile()) {
            throw new GradleException("Missing gateway-core snapshot metadata: ${metadataFile}")
        }
        def metadata = new groovy.xml.XmlSlurper(false, false).parse(metadataFile)
        def matches = metadata.versioning.snapshotVersions.snapshotVersion.findAll { snapshotVersion ->
            String metadataClassifier = snapshotVersion.classifier.text()
            snapshotVersion.extension.text() == extension
                    && (classifier == null ? metadataClassifier.isEmpty() : metadataClassifier == classifier)
        }
        if (matches.size() != 1) {
            throw new GradleException(
                    "Expected one ${classifier == null ? 'main' : classifier} ${extension} entry in ${metadataFile}, got ${matches.size()}"
            )
        }
        resolvedVersion = matches[0].value.text()
        if (resolvedVersion.isBlank()) {
            throw new GradleException("Snapshot metadata entry has no resolved version in ${metadataFile}")
        }
    }

    String classifierSuffix = classifier == null ? '' : "-${classifier}"
    new File(publicationDir, "${gatewayCoreArtifactId}-${resolvedVersion}${classifierSuffix}.${extension}")
}

tasks.register('verifyGatewayCorePublication') {
    group = 'verification'
    description = 'Verifies the local Maven publication shape for mcp-gateway-core.'
    dependsOn tasks.named('publishGatewayCorePublicationToGatewayCoreStagingRepository')

    doLast {
        File publicationDir = gatewayCorePublicationDirectory()
        List<File> publicationArtifacts = [
                gatewayCorePublicationArtifact(publicationDir, 'pom'),
                gatewayCorePublicationArtifact(publicationDir, 'jar'),
                gatewayCorePublicationArtifact(publicationDir, 'jar', 'sources'),
                gatewayCorePublicationArtifact(publicationDir, 'jar', 'javadoc')
        ]
        publicationArtifacts.each { artifact ->
            if (!artifact.isFile()) {
                throw new GradleException("Missing gateway-core publication artifact: ${artifact}")
            }
            verifyChecksumFile(artifact, 'MD5', 'md5')
            verifyChecksumFile(artifact, 'SHA-1', 'sha1')
            verifyChecksumFile(artifact, 'SHA-256', 'sha256')
            verifyChecksumFile(artifact, 'SHA-512', 'sha512')
        }
        verifyPomMetadata(publicationArtifacts[0])
    }
}

tasks.register('stageGatewayCoreCentralPortalBundle', Zip) {
    group = 'publishing'
    description = 'Stages a Central Portal upload bundle for mcp-gateway-core without signatures.'
    dependsOn tasks.named('publishGatewayCorePublicationToGatewayCoreStagingRepository')
    from(gatewayCorePublicationDirectory()) {
        into gatewayCorePublicationPath
    }
    archiveFileName = gatewayCoreCentralBundleName
    destinationDirectory = layout.buildDirectory.dir('central-portal-bundle')
}

tasks.register('verifyGatewayCoreCentralPortalBundle') {
    group = 'verification'
    description = 'Verifies the unsigned Central Portal bundle shape and checksums.'
    dependsOn tasks.named('stageGatewayCoreCentralPortalBundle')

    doLast {
        File bundle = tasks.named('stageGatewayCoreCentralPortalBundle').get().archiveFile.get().asFile
        verifyCentralPortalBundleShape(gatewayCorePublicationDirectory(), bundle, false)
        verifyCentralPortalBundlePayload(bundle, false)
        println 'Central Portal bundle shape verified without .asc signatures.'
    }
}

tasks.register('prepareGatewayCoreSignedCentralPortalDryRunPublication') {
    group = 'publishing'
    description = 'Creates a signed dry-run publication directory using an ephemeral local GPG key.'
    dependsOn tasks.named('publishGatewayCorePublicationToGatewayCoreStagingRepository')

    doLast {
        File publicationRoot = gatewayCoreSignedDryRunPublicationRoot()
        delete publicationRoot
        copy {
            from(gatewayCorePublicationDirectory()) {
                into gatewayCorePublicationPath
            }
            into publicationRoot
        }
        File gpgHome = gatewayCoreSignedDryRunGpgHome()
        delete gpgHome
        generateDryRunSigningKey(gpgHome)
        gatewayCoreRequiredArtifacts(gatewayCoreSignedDryRunPublicationDirectory()).each { artifact ->
            signDryRunArtifact(gpgHome, artifact)
        }
    }
}

tasks.register('stageGatewayCoreSignedCentralPortalDryRunBundle', Zip) {
    group = 'publishing'
    description = 'Stages a signed Central Portal dry-run upload bundle for mcp-gateway-core.'
    dependsOn tasks.named('prepareGatewayCoreSignedCentralPortalDryRunPublication')
    from gatewayCoreSignedDryRunPublicationRoot()
    archiveFileName = gatewayCoreCentralBundleName
    destinationDirectory = layout.buildDirectory.dir('signed-central-portal-dry-run')
}

tasks.register('verifyGatewayCoreSignedCentralPortalDryRun') {
    group = 'verification'
    description = 'Verifies signatures, checksums, and ZIP payload for the signed Central Portal dry run.'
    dependsOn tasks.named('stageGatewayCoreSignedCentralPortalDryRunBundle')

    doLast {
        File bundle = gatewayCoreSignedDryRunBundle()
        File gpgHome = gatewayCoreSignedDryRunGpgHome()
        verifyCentralPortalBundleShape(gatewayCoreSignedDryRunPublicationDirectory(), bundle, true, gpgHome)
        verifyCentralPortalBundlePayload(bundle, true, gpgHome)
    }
}

tasks.register('cleanGatewayCoreSignedCentralPortalDryRunGpgHome', Delete) {
    delete gatewayCoreSignedDryRunGpgHome()
}

tasks.named('verifyGatewayCoreSignedCentralPortalDryRun') {
    finalizedBy tasks.named('cleanGatewayCoreSignedCentralPortalDryRunGpgHome')
}

